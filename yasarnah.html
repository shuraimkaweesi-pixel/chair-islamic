<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yasarnah - Learn Arabic Letters</title>

<style>
body{
font-family:Arial;
background:#0f0f0f;
color:#FFD700;
margin:0;
padding:20px;
padding-bottom:90px;
text-align:center;
}

h1{
margin-bottom:10px;
color:#FFD700;
}

#status{
margin-bottom:20px;
color:#999;
font-size:14px;
min-height:20px;
}

#lessonBox{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
max-width:500px;
margin:0 auto;
}

.lesson{
background:#1a1a1a;
padding:15px 5px;
border-radius:12px;
transition:0.2s;
cursor:pointer;
border:2px solid transparent;
}

.lesson:active{
transform:scale(0.95);
}

.lesson.active{
border:2px solid gold;
background:#252525;
box-shadow:0 0 15px rgba(255,215,0,0.3);
}

.arabic{
font-size:44px;
margin-bottom:5px;
line-height:1;
}

.name{
font-size:12px;
color:#ddd;
}

.controls{
margin-top:25px;
}

button{
background:#FFD700;
color:black;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
font-size:15px;
margin:5px;
}

button:active{
background:#e6c200;
}
</style>
</head>

<body>

<h1>📖 Yasarnah (Alif → Yaa)</h1>
<p id="status">Tap any letter to hear it</p>

<div id="lessonBox"></div>

<div class="controls">
<button onclick="stopLesson()">⏸ Stop</button>
<button onclick="playAll()">▶ Play All</button>
<button onclick="setRepeat(1)">1x</button>
<button onclick="setRepeat(3)">3x</button>
</div>

<script>
// =====================
// LETTERS - ARABIC ONLY
// =====================
const letters = [
{a:"ا", name:"Alif"}, {a:"ب", name:"Ba"}, {a:"ت", name:"Ta"}, {a:"ث", name:"Tha"},
{a:"ج", name:"Jeem"}, {a:"ح", name:"Ha"}, {a:"خ", name:"Kha"}, {a:"د", name:"Dal"},
{a:"ذ", name:"Dhal"}, {a:"ر", name:"Ra"}, {a:"ز", name:"Zay"}, {a:"س", name:"Seen"},
{a:"ش", name:"Sheen"}, {a:"ص", name:"Sad"}, {a:"ض", name:"Dad"}, {a:"ط", name:"Taa"},
{a:"ظ", name:"Zaa"}, {a:"ع", name:"Ain"}, {a:"غ", name:"Ghain"}, {a:"ف", name:"Fa"},
{a:"ق", name:"Qaf"}, {a:"ك", name:"Kaf"}, {a:"ل", name:"Lam"}, {a:"م", name:"Meem"},
{a:"ن", name:"Noon"}, {a:"ه", name:"Ha"}, {a:"و", name:"Waw"}, {a:"ي", name:"Yaa"}
];

// =====================
// SETTINGS
// =====================
let repeatCount = 3;
let currentIndex = null;
let repeat = 0;
let isPlaying = false;
let speech = window.speechSynthesis;
let arabicVoice = null;

// =====================
// BUILD UI
// =====================
const box = document.getElementById("lessonBox");
letters.forEach((l,i)=>{
  box.innerHTML += `
  <div class="lesson" onclick="startLetter(${i})">
    <div class="arabic">${l.a}</div>
    <div class="name">${l.name}</div>
  </div>
  `;
});

// =====================
// FIND ARABIC VOICE
// =====================
function loadVoices() {
  const voices = speech.getVoices();
  // Try to find Arabic voice, fallback to default
  arabicVoice = voices.find(v => v.lang.startsWith('ar')) || voices[0];
  console.log("Using voice:", arabicVoice?.name);
}
speech.onvoiceschanged = loadVoices;
loadVoices(); // Try immediately too

// =====================
// SPEECH FUNCTION - WORKS EVERYWHERE
// =====================
function speak(text, callback) {
  if (speech.speaking) speech.cancel(); // Stop current speech

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ar-SA'; // Arabic Saudi
  utter.rate = 0.8; // Slower for learning
  utter.voice = arabicVoice;
  utter.onend = callback;
  utter.onerror = (e) => {
    console.log("Speech error:", e);
    document.getElementById("status").innerText = "Voice error. Try again.";
    isPlaying = false;
  };

  speech.speak(utter);
}

// =====================
// CONTROLS
// =====================
function setRepeat(num) {
  repeatCount = num;
  document.getElementById("status").innerText = `Repeat set to ${num}x`;
  setTimeout(() => {
    if (!isPlaying) document.getElementById("status").innerText = "Tap any letter to hear it";
  }, 1500);
}

function stopLesson(){
  speech.cancel();
  isPlaying = false;
  currentIndex = null;
  repeat = 0;
  document.querySelectorAll(".lesson").forEach(l=>{
    l.classList.remove("active");
  });
  document.getElementById("status").innerText = "Stopped";
}

function playAll() {
  stopLesson();
  currentIndex = 0;
  repeat = 0;
  isPlaying = true;
  playLetter();
}

// =====================
// START / TOGGLE
// =====================
function startLetter(index){
  // Toggle pause if same letter
  if(currentIndex === index && isPlaying){
    speech.cancel();
    isPlaying = false;
    document.getElementById("status").innerText = "Paused";
    document.querySelectorAll(".lesson")[index].classList.remove("active");
    return;
  }

  // New start
  stopLesson();
  currentIndex = index;
  repeat = 0;
  isPlaying = true;
  playLetter();
}

// =====================
// PLAY LETTER
// =====================
function playLetter(){
  if (!isPlaying || currentIndex === null || currentIndex >= letters.length) {
    stopLesson();
    document.getElementById("status").innerText = "Finished! Alhamdulillah";
    return;
  }

  const letter = letters[currentIndex];
  document.getElementById("status").innerText = `Playing: ${letter.name} (${repeat + 1}/${repeatCount})`;
  highlight(currentIndex);

  speak(letter.a, () => {
    if (!isPlaying) return;

    repeat++;
    if(repeat < repeatCount){
      setTimeout(() => playLetter(), 300); // Small pause between repeats
      return;
    }

    // Move to next letter
    currentIndex++;
    repeat = 0;
    setTimeout(() => playLetter(), 500); // Pause between letters
  });
}

// =====================
// HIGHLIGHT
// =====================
function highlight(index){
  document.querySelectorAll(".lesson").forEach((el,i)=>{
    el.classList.toggle("active", i === index);
  });
}
</script>

</body>
</html>
