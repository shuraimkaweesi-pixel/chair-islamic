<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quran - Chair Islamic TV</title>

<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
padding:20px;
}

select,input,button{
padding:10px;
margin:10px;
font-size:16px;
border-radius:6px;
}

button{
background:#16a34a;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#15803d;
}

.ayah{
margin:25px 0;
padding:15px;
border-bottom:1px solid #333;
}

.arabic{
font-size:28px;
direction:rtl;
line-height:1.8;
color:#FFD700;
}

.translation{
font-size:16px;
margin-top:8px;
color:#ccc;
}

</style>

</head>

<body>

<h1>📖 Holy Quran</h1>

<input id="surahSearch" placeholder="Search Surah..." onkeyup="searchSurah()">

<br>

<select id="surahSelect">

<option value="">Select Surah</option>

<option value="1">1 - Al-Fatihah</option>
<option value="2">2 - Al-Baqarah</option>
<option value="3">3 - Aal-Imran</option>
<option value="4">4 - An-Nisa</option>
<option value="5">5 - Al-Ma'idah</option>
<option value="6">6 - Al-An'am</option>
<option value="7">7 - Al-A'raf</option>
<option value="8">8 - Al-Anfal</option>
<option value="9">9 - At-Tawbah</option>
<option value="10">10 - Yunus</option>
<option value="11">11 - Hud</option>
<option value="12">12 - Yusuf</option>
<option value="13">13 - Ar-Ra'd</option>
<option value="14">14 - Ibrahim</option>
<option value="15">15 - Al-Hijr</option>
<option value="16">16 - An-Nahl</option>
<option value="17">17 - Al-Isra</option>
<option value="18">18 - Al-Kahf</option>
<option value="19">19 - Maryam</option>
<option value="20">20 - Ta-Ha</option>

<option value="36">36 - Ya Sin</option>
<option value="55">55 - Ar Rahman</option>
<option value="67">67 - Al Mulk</option>
<option value="78">78 - An Naba</option>
<option value="112">112 - Al Ikhlas</option>
<option value="113">113 - Al Falaq</option>
<option value="114">114 - An Nas</option>

</select>

<br>

<select id="reciterSelect">

<option value="afasy">Mishary Al Afasy</option>
<option value="baset">Abdul Basit</option>
<option value="ghamdi">Saad Al Ghamdi</option>

</select>

<br>

<button onclick="loadSurah()">Load Surah</button>

<div id="audioPlayer" style="margin-top:20px;"></div>

<div id="quranText" style="margin-top:40px;"></div>

<script src="script.js"></script>

</body>

</html>
