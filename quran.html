<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chair Islamic TV - Quran</title>

<style>
/* Full Page Background */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  background: #000000; /* Full black background */
  color: #FFD700;      /* Premium gold text by default */
}

/* Page Title */
h1 {
  text-align: center;
  margin: 20px 0;
  color: #FFD700;
}

/* Quran Controls */
#quranControls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

input, select, button {
  padding: 8px 12px;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #FFD700;
  background: #000000;
  color: #FFD700;
  outline: none;
  cursor: pointer;
  transition: 0.3s;
}

input::placeholder {
  color: #FFD700;
  opacity: 0.6;
}

button:hover, select:hover, input:hover {
  background: #222;
}

/* Quran Text Container */
#quranText {
  padding: 10px 20px;
}

/* Ayah Styles */
.ayah {
  background: transparent;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.arabic {
  font-size: 26px;
  text-align: right;
  direction: rtl;
  font-family: 'Amiri', serif;
  line-height: 1.8;
}

.translation {
  font-size: 18px;
  color: #FFD700;
  line-height: 1.6;
  margin-top: 4px;
}

/* Currently Playing Ayah Highlight */
.playing {
  background: rgba(139, 69, 19, 0.3); /* brownish filter */
  color: #FFFF66; /* yellow-gold highlight */
  border-left: 4px solid #FFFF66;
  transition: 0.3s;
}

/* Floating Audio Player */
#audioPlayer {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  width: 95%;
  max-width: 600px;
  background: #000000;
  color: #FFD700;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  z-index: 999;
}

/* Floating Download Button */
#downloadBtn {
  position: fixed;
  bottom: 10px;
  right: 15px;
  background: #FFD700;
  color: #000000;
  padding: 12px 16px;
  border: none;
  border-radius: 50px;
  font-size: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  cursor: pointer;
  z-index: 1000;
  transition: 0.3s;
}

#downloadBtn:hover {
  background: #FFC300;
  color: #000;
}
</style>
</head>

<body>

<h1>Quran - Chair Islamic TV</h1>

<div id="quranControls">
  <input type="text" id="surahSearch"
         placeholder="Search Surah" onkeyup="searchSurah()">
  <select id="surahSelect"></select>
  <select id="reciterSelect">
    <option value="afasy">Mishary Al-Afasy</option>
    <option value="baset">Abdul Basit</option>
    <option value="ghamdi">Saad Al-Ghamdi</option>
  </select>
  <button onclick="loadSurah()">Load Surah</button>
</div>

<div id="quranText"></div>

<button id="downloadBtn" onclick="downloadSurah()">⬇️ Download</button>

<script src="script.js"></script>

<script>
// Highlight clicked ayah and scroll into view
document.addEventListener('click', function(e){
  if(e.target.classList.contains('ayah') || e.target.closest('.ayah')){
    const el = e.target.closest('.ayah');
    document.querySelectorAll('.ayah').forEach(a => a.classList.remove('playing'));
    el.classList.add('playing');
    el.scrollIntoView({behavior: 'smooth', block: 'center'});
  }
});
</script>

</body>
</html>
