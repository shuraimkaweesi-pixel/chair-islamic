<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran Reader | Chair Islamic TV</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="apple-touch-icon" href="logo.png">

<!-- Main CSS -->
<link rel="stylesheet" href="styles.css">

<style>
/* Quran Section */
.container {
  max-width:900px;
  margin:20px auto;
  padding:15px;
}
select,input,button{
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}
button{
  background:#FFD700;
  font-weight:bold;
  cursor:pointer;
}
.ayah{
  margin-bottom:15px;
}
.arabic{
  font-size:24px;
  direction:rtl;
  text-align:right;
  color:#fff;
}
.translation{
  font-size:18px;
  text-align:left;
  color:#ddd;
}
#quranResults{
  margin-top:15px;
  background:#1a1a1a;
  padding:15px;
  border-radius:6px;
  color:#ddd;
  white-space:pre-wrap;
}

/* Bottom Navigation */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-around;
  padding:14px 0;
  border-top:1px solid #333;
}
.bottom-nav a{
  color:#FFD700;
  text-decoration:none;
  font-size:16px;
  flex:1;
  text-align:center;
}
.bottom-nav a:hover{ color:white; }
</style>
</head>
<body>

<div class="container">
<h1>📖 Quran Reader</h1>

<!-- Surah Selection -->
<label for="surahSelect">Select Surah:</label>
<select id="surahSelect">
  <option value="">--Choose Surah--</option>
</select>

<input id="surahSearch" placeholder="Search Surah..." onkeyup="searchSurah()">
<button onclick="loadSurah()">Load Surah</button>

<select id="reciterSelect">
  <option value="afasy">Al Afasy</option>
  <option value="baset">Baset</option>
  <option value="ghamdi">Ghamdi</option>
</select>

<div id="audioPlayer"></div>

<!-- Quran Text -->
<div id="quranText" style="margin-top:20px;"></div>

<!-- AI Search -->
<h2>🤖 Ask Quran AI</h2>
<input id="quranSearch" placeholder="Search or ask about a verse...">
<button onclick="searchQuranAI()">Search AI</button>
<div id="quranResults">Your AI result will appear here...</div>

</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
<a href="index.html">🏠 Home</a>
<a href="quran.html">📖 Quran</a>
<a href="hadith.html">📜 Hadith</a>
<a href="prayer.html">🕌 Prayer</a>
<a href="videos.html">🎥 Videos</a>
</div>

<script>
// ===============================
// SURAH LIST
// ===============================
const surahNames = [
"Al-Fatiha","Al-Baqarah","Aal-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus",
"Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha",
"Al-Anbiya","Al-Hajj","Al-Mu’minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum",
"Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir",
"Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf",
"Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadila","Al-Hashr","Al-Mumtahanah",
"As-Saff","Al-Jumu’ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij",
"Nuh","Al-Jinn","Al-Muzzammil","Al-Muddathir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa",
"At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad",
"Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat",
"Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr",
"Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"
];

// Populate dropdown
const surahSelect = document.getElementById("surahSelect");
surahNames.forEach((name,i)=>{
  let option=document.createElement("option");
  option.value=i+1;
  option.textContent=(i+1)+" - "+name;
  surahSelect.appendChild(option);
});

// Surah search
function searchSurah(){
  const input = document.getElementById("surahSearch").value.toLowerCase();
  for(let i=0;i<surahSelect.options.length;i++){
    let txt = surahSelect.options[i].text.toLowerCase();
    surahSelect.options[i].style.display = txt.includes(input) ? "block":"none";
  }
}

// Load Surah
async function loadSurah() {
  const surahNumber = parseInt(document.getElementById("surahSelect").value);
  if(!surahNumber){ alert("Please select a Surah"); return; }

  try{
    const arabicRes = await fetch("quran.json");
    const englishRes = await fetch("quran_en.json");
    const arabicData = await arabicRes.json();
    const englishData = await englishRes.json();

    const arabicSurah = arabicData[surahNumber-1]?.ayahs || arabicData.data?.surahs?.[surahNumber-1]?.ayahs;
    const englishSurah = englishData[surahNumber-1]?.ayahs || englishData.data?.surahs?.[surahNumber-1]?.ayahs;

    let html="";
    arabicSurah.forEach((ayah,i)=>{
      const eng = englishSurah[i]?.text || englishSurah[i]?.translation || "Translation unavailable";
      html+=`<div class="ayah">
        <div class="arabic">${i+1}. ${ayah.text}</div>
        <div class="translation">${i+1}. ${eng}</div>
      </div>`;
    });
    document.getElementById("quranText").innerHTML = html;

    // Audio
    const reciter = document.getElementById("reciterSelect").value;
    const reciters = {
      afasy: "https://server8.mp3quran.net/afs/",
      baset: "https://server8.mp3quran.net/bas/",
      ghamdi: "https://server7.mp3quran.net/s_gmd/"
    };
    const audioURL = reciters[reciter] + String(surahNumber).padStart(3,"0") + ".mp3";
    document.getElementById("audioPlayer").innerHTML=`<audio controls><source src="${audioURL}" type="audio/mpeg"></audio>`;
  } catch(err){
    console.error(err);
    document.getElementById("quranText").innerHTML="<p style='color:red'>Failed to load Surah.</p>";
  }
}

// ===============================
// Quran AI Search
// ===============================
async function searchQuranAI(){
  const topic = document.getElementById("quranSearch").value.trim();
  const resultsDiv = document.getElementById("quranResults");

  if(!topic){ resultsDiv.innerText="Please enter a query."; return; }

  resultsDiv.innerText="Searching...";

  try{
    const res = await fetch("/api/quran-search",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({topic})
    });
    const data = await res.json();
    resultsDiv.innerText = data.result || "No answer from AI.";
  } catch(err){
    console.error(err);
    resultsDiv.innerText="AI could not respond.";
  }
}
</script>
</body>
</html>
