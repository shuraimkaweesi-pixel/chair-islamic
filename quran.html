<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quran - Chair Islamic TV</title>

<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
padding:20px;
}

select,input,button{
padding:10px;
margin:10px;
font-size:16px;
border-radius:6px;
}

button{
background:#16a34a;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#15803d;
}

.ayah{
margin:25px 0;
padding:15px;
border-bottom:1px solid #333;
}

.arabic{
font-size:28px;
direction:rtl;
line-height:1.8;
color:#FFD700;
}

.translation{
font-size:16px;
margin-top:8px;
color:#ccc;
}

</style>

</head>

<body>

<h1>📖 Holy Quran</h1>

<input id="surahSearch" placeholder="Search Surah..." onkeyup="searchSurah()">

<br>

<select id="surahSelect"></select>

<br>

<select id="reciterSelect">

<option value="afasy">Mishary Al Afasy</option>
<option value="baset">Abdul Basit</option>
<option value="ghamdi">Saad Al Ghamdi</option>

</select>

<br>

<button onclick="loadSurah()">Load Surah</button>

<div id="audioPlayer" style="margin-top:20px;"></div>

<div id="quranText" style="margin-top:40px;"></div>

<script src="script.js"></script>

</body>
</html>
