<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Times | Chair Islamic TV</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A0A0A">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
            <img src="logo.png" class="logo-header" alt="Logo">
            <h1 style="margin:0">Prayer Times</h1>
        </div>
        
        <p id="location" class="page-header">Loading Kampala times...</p>
        <div class="date" id="date">-- | --</div>

        <div id="prayerBox" class="prayer-box">
            Loading schedule...
        </div>

        <div id="countdown">
            Next prayer in: --:--:--
        </div>

        <p id="unlockMsg" class="text-red mt-2" style="text-align:center;font-size:13px;background:rgba(255,77,77,0.1);padding:10px;border-radius:8px;">
            ⚠️ Tap anywhere to enable Adhan audio
        </p>

        <div class="btn-group">
            <button class="btn-outline" onclick="testAdhan()">🔊 Test Adhan Sound</button>
            <button class="btn-outline" id="stopAdhanBtn" onclick="stopAdhan()" style="display:none;background:#8b0000;border-color:#ff4d4d;color:white;">⏹ Stop Adhan</button>
        </div>
    </div>

    <!-- Adhan Audio -->
    <audio id="adhanAudio" preload="auto">
        <source src="https://cdn.islamic.network/audio/adhan/1.mp3" type="audio/mpeg">
    </audio>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html"><span>🏠</span>Home</a>
        <a href="quran.html"><span>📖</span>Quran</a>
        <a href="hadith.html"><span>📜</span>Hadith</a>
        <a href="prayer.html" class="active"><span>🕌</span>Prayer</a>
        <a href="videos.html"><span>🎥</span>Videos</a>
    </div>

<script>
// =====================
// GLOBAL VARIABLES
// =====================
let prayerTimings = {};
let nextPrayerName = "";
let countdownInterval = null;
let adhanCheckInterval = null;
let lastAdhanPlayed = "";
let lastAdhanDate = "";
let audioUnlocked = false;

const adhanAudio = document.getElementById("adhanAudio");
const stopBtn = document.getElementById("stopAdhanBtn");

const KAMPALA_LAT = 0.3476;
const KAMPALA_LON = 32.5825;

// =====================
// CACHE HELPERS
// =====================
function getTodayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function saveToCache(data) {
    localStorage.setItem('prayerData', JSON.stringify({
        date: getTodayKey(),
        payload: data
    }));
}

function loadFromCache() {
    const cached = localStorage.getItem('prayerData');
    if (!cached) return null;
    const parsed = JSON.parse(cached);
    return (parsed.date === getTodayKey()) ? parsed.payload : null;
}

// =====================
// AUDIO UNLOCK LOGIC
// =====================
function unlockAudio() {
    if (audioUnlocked) return;
    
    adhanAudio.play().then(() => {
        adhanAudio.pause();
        adhanAudio.currentTime = 0;
        audioUnlocked = true;
        document.getElementById("unlockMsg").style.display = "none";
        console.log("Audio System: Active");
    }).catch(e => console.log("Unlock pending user interaction"));
}

document.body.addEventListener("click", unlockAudio, { once: true });
document.body.addEventListener("touchstart", unlockAudio, { once: true });

// =====================
// UNIFIED ADHAN FUNCTIONS
// =====================
function triggerAdhan(prayer) {
    stopAllAudio();

    if (adhanAudio && audioUnlocked) {
        adhanAudio.currentTime = 0;
        adhanAudio.volume = 1.0; 
        adhanAudio.play().then(() => {
            console.log(`Playing Adhan for ${prayer}`);
            if(stopBtn) stopBtn.style.display = "block";
        }).catch(e => {
            console.log("Adhan blocked:", e);
            alert("Time for " + prayer + "! (Tap to enable audio)");
        });
    } else {
        alert("🕌 It is time for " + prayer);
    }

    if ("Notification" in window && Notification.permission === "granted") {
        new Notification("🕌 Prayer Time", { 
            body: `It's time for ${prayer}`, 
            icon: "logo.png" 
        });
    }

    if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
}

function stopAdhan() {
    if (adhanAudio) {
        adhanAudio.pause();
        adhanAudio.currentTime = 0;
    }
    if(stopBtn) stopBtn.style.display = "none";
}

function stopAllAudio() {
    stopAdhan();
}

function testAdhan() {
    if (!audioUnlocked) {
        alert("Tap the screen first to enable audio.");
        return;
    }
    triggerAdhan("Test");
}

// =====================
// PRAYER TIME LOGIC
// =====================
function getNextPrayer(timings) {
    const prayers = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
    const now = new Date();
    
    for (let p of prayers) {
        const [hh, mm] = timings[p].split(":");
        const pTime = new Date();
        pTime.setHours(hh, mm, 0, 0);
        if (pTime > now) return p;
    }
    return "Fajr";
}

function displayPrayerTimes(data) {
    const t = data.timings;
    prayerTimings = {
        Fajr: t.Fajr.slice(0, 5),
        Dhuhr: t.Dhuhr.slice(0, 5),
        Asr: t.Asr.slice(0, 5),
        Maghrib: t.Maghrib.slice(0, 5),
        Isha: t.Isha.slice(0, 5)
    };
    
    nextPrayerName = getNextPrayer(prayerTimings);

    document.getElementById("date").innerHTML = 
        `${data.date.gregorian.date} | ${data.date.hijri.date} ${data.date.hijri.month.en}`;

    const prayers = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
    let html = "";

    prayers.forEach(p => {
        const isNext = (p === nextPrayerName);
        html += `
        <div class="prayer ${isNext ? 'next' : ''}">
            <span>${p}</span>
            <span>${prayerTimings[p]}</span>
        </div>`;
    });

    document.getElementById("prayerBox").innerHTML = html;
    startCountdown();
    startAdhanChecker();
}

function startCountdown() {
    if (countdownInterval) clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
        if (!Object.keys(prayerTimings).length) return;

        const [hh, mm] = prayerTimings[nextPrayerName].split(":");
        let now = new Date();
        let pTime = new Date();
        pTime.setHours(hh, mm, 0, 0);

        if (nextPrayerName === "Fajr" && pTime < now) {
            pTime.setDate(pTime.getDate() + 1);
        }

        let diff = pTime - now;
        if (diff <= 0) {
            loadPrayerTimes(KAMPALA_LAT, KAMPALA_LON, true);
            return;
        }

        let h = Math.floor(diff / 3600000);
        let m = Math.floor((diff % 3600000) / 60000);
        let s = Math.floor((diff % 60000) / 1000);

        document.getElementById("countdown").innerHTML = 
            `Next: ${nextPrayerName} in ${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }, 1000);
}

function startAdhanChecker() {
    if (adhanCheckInterval) clearInterval(adhanCheckInterval);

    adhanCheckInterval = setInterval(() => {
        if (!Object.keys(prayerTimings).length) return;

        const now = new Date();
        const today = now.toDateString();
        const currentTime = now.getHours().toString().padStart(2, "0") + ":" + 
                            now.getMinutes().toString().padStart(2, "0");

        if (lastAdhanDate !== today) {
            lastAdhanPlayed = "";
            lastAdhanDate = today;
        }

        for (let p in prayerTimings) {
            if (currentTime === prayerTimings[p] && lastAdhanPlayed !== p) {
                triggerAdhan(p);
                lastAdhanPlayed = p;
            }
        }
    }, 30000);
}

async function loadPrayerTimes(lat, lon, isDefault = false) {
    const cached = loadFromCache();
    if (cached) displayPrayerTimes(cached);

    try {
        const response = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`);
        const result = await response.json();
        const data = result.data;
        
        displayPrayerTimes(data);
        saveToCache(data);
        document.getElementById("location").innerHTML = isDefault ? "Kampala, Uganda" : "Local Times Detected";
    } catch (e) {
        console.log("Network error, using cache.");
        if (!cached) document.getElementById("prayerBox").innerHTML = "Connection Error.";
    }
}

// =====================
// INITIALIZE
// =====================
loadPrayerTimes(KAMPALA_LAT, KAMPALA_LON, true);

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
        loadPrayerTimes(pos.coords.latitude, pos.coords.longitude, false);
    });
}

if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/chair-islamic/sw.js');
  });
}
</script>

</body>
</html>
