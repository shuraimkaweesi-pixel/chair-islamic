<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Times | Chair Islamic TV</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">

<style>
body{
font-family:Arial;
background:#0f0f0f;
color:#FFD700;
margin:0;
padding:20px;
padding-bottom:90px;
text-align:center;
}

h1{
color:#FFD700;
text-shadow:1px 1px 3px #000;
}

#location{text-align:center;color:#ddd;}

.prayer-box{
background:#1a1a1a;
padding:20px;
border-radius:12px;
margin-top:20px;
color:white;
font-size:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
text-align:left;
}

.prayer{
display:flex;
justify-content:space-between;
padding:14px;
border-bottom:1px solid #333;
}

.prayer:last-child{border-bottom:none;}

.next{
background:#FFD700;
color:black;
font-weight:bold;
border-radius:8px;
}

.date{
margin-top:10px;
font-size:18px;
color:#FFD700;
text-align:center;
font-weight:bold;
}

#countdown{
text-align:center;
font-size:26px;
margin-top:20px;
color:#FFD700;
font-weight:bold;
}

#unlockMsg{
font-size:14px;
color:#999;
margin-top:10px;
}

/* Bottom Navigation */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
display:flex;
justify-content:space-around;
padding:15px 0;
border-top:1px solid #333;
}

.bottom-nav a{
color:#FFD700;
text-decoration:none;
font-size:18px;
flex:1;
text-align:center;
}
</style>
</head>

<body>

<h1>Prayer Times</h1>
<p id="location">Loading Kampala times...</p>
<div class="date" id="date"></div>

<div id="prayerBox" class="prayer-box">
Loading prayer times...
</div>

<div id="countdown">
Next prayer in: --:--:--
</div>

<p id="unlockMsg">Tap anywhere once to enable Adhan audio</p>

<!-- Adhan Audio - hidden -->
<audio id="adhanAudio" preload="auto">
<source src="https://cdn.islamic.network/audio/adhan/1.mp3" type="audio/mpeg">
</audio>

<!-- Navigation -->
<div class="bottom-nav">
<a href="index.html">🏠 Home</a>
<a href="quran.html">📖 Quran</a>
<a href="hadith.html">📜 Hadith</a>
<a href="prayer.html">🕌 Prayer</a>
<a href="videos.html">🎥 Videos</a>
</div>

<script>
// =====================
// PRAYER VARIABLES
// =====================
let prayerTimings = null;
let nextPrayerName = "";
let countdownInterval = null;
let adhanCheckInterval = null;
let lastAdhanPlayed = ""; // e.g. "Fajr"
let lastAdhanDate = ""; // e.g. "Thu Apr 23 2026"
let audioUnlocked = false;

const KAMPALA_LAT = 0.3476;
const KAMPALA_LON = 32.5825;

// =====================
// CACHE HELPERS
// =====================
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function saveToCache(data) {
  localStorage.setItem('prayerData', JSON.stringify({
    date: getTodayKey(),
    data: data
  }));
}

function loadFromCache() {
  const cached = localStorage.getItem('prayerData');
  if (!cached) return null;
  const parsed = JSON.parse(cached);
  if (parsed.date === getTodayKey()) return parsed.data;
  return null;
}

// =====================
// UNLOCK AUDIO FOR AUTOPLAY
// =====================
function unlockAudio() {
  if (audioUnlocked) return;
  const adhanAudio = document.getElementById("adhanAudio");
  adhanAudio.play().then(() => {
    adhanAudio.pause();
    adhanAudio.currentTime = 0;
    audioUnlocked = true;
    document.getElementById("unlockMsg").style.display = "none";
    console.log("Adhan audio unlocked");
  }).catch(e => console.log("Unlock failed:", e));
}
// First tap anywhere unlocks audio
document.body.addEventListener("click", unlockAudio, { once: true });
document.body.addEventListener("touchstart", unlockAudio, { once: true });

// =====================
// GET NEXT PRAYER
// =====================
function getNextPrayer(timings){
  const prayers = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];
  const now = new Date();
  let next = null;

  for(let p of prayers){
    const time = timings[p].split(":");
    const prayerTime = new Date();
    prayerTime.setHours(time[0], time[1], 0, 0);
    if(prayerTime > now){
      next = p;
      break;
    }
  }
  if(!next) next = "Fajr"; // After Isha, next is tomorrow's Fajr
  return next;
}

// =====================
// DISPLAY PRAYERS
// =====================
function displayPrayerTimes(data){
  prayerTimings = data.data.timings;
  const date = data.data.date;
  nextPrayerName = getNextPrayer(prayerTimings);

  document.getElementById("date").innerHTML =
  `${date.gregorian.date} | ${date.hijri.date} ${date.hijri.month.en}`;

  const prayers = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];
  let html = "";

  prayers.forEach(p=>{
    const cls = p === nextPrayerName? "prayer next" : "prayer";
    html += `<div class="${cls}">
      <span>${p}</span>
      <span>${prayerTimings[p]}</span>
    </div>`;
  });

  document.getElementById("prayerBox").innerHTML = html;
  startCountdown();
  startAdhanChecker();
}

// =====================
// COUNTDOWN TIMER
// =====================
function startCountdown(){
  if(countdownInterval) clearInterval(countdownInterval);

  countdownInterval = setInterval(()=>{
    if(!prayerTimings) return;

    let timeStr = prayerTimings[nextPrayerName];
    let parts = timeStr.split(":");
    let now = new Date();
    let prayerTime = new Date();
    prayerTime.setHours(parts[0], parts[1], 0, 0);

    // If it's past today's prayer time, target tomorrow's Fajr
    if(nextPrayerName === "Fajr" && prayerTime < now){
      prayerTime.setDate(prayerTime.getDate()+1);
    }

    let diff = prayerTime - now;

    // If time passed, recalculate next prayer
    if(diff < 0){
      nextPrayerName = getNextPrayer(prayerTimings);
      // Re-render the prayer list to highlight new "next" prayer
      const prayers = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];
      let html = "";
      prayers.forEach(p=>{
        const cls = p === nextPrayerName? "prayer next" : "prayer";
        html += `<div class="${cls}">
          <span>${p}</span>
          <span>${prayerTimings[p]}</span>
        </div>`;
      });
      document.getElementById("prayerBox").innerHTML = html;
      return;
    }

    let hours = Math.floor(diff/1000/3600);
    let minutes = Math.floor((diff/1000%3600)/60);
    let seconds = Math.floor((diff/1000)%60);

    document.getElementById("countdown").innerHTML =
    `Next prayer (${nextPrayerName}) in: ${hours.toString().padStart(2,"0")}:${minutes.toString().padStart(2,"0")}:${seconds.toString().padStart(2,"0")}`;

  },1000);
}

// =====================
// ADHAN CHECKER
// =====================
function startAdhanChecker(){
  if(adhanCheckInterval) clearInterval(adhanCheckInterval);

  adhanCheckInterval = setInterval(()=>{
    if(!prayerTimings) return;

    const now = new Date();
    const today = now.toDateString();
    const currentTime = now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");

    // Reset at midnight so Adhan can play again tomorrow
    if(lastAdhanDate!== today){
      lastAdhanPlayed = "";
      lastAdhanDate = today;
    }

    // Check if current time matches any prayer time
    for(let p in prayerTimings){
      if(currentTime === prayerTimings[p].slice(0,5) && lastAdhanPlayed!== p){
        triggerAdhan(p);
        lastAdhanPlayed = p;
      }
    }
  }, 15000); // Check every 15 seconds
}

function triggerAdhan(prayer){
  const adhanAudio = document.getElementById("adhanAudio");

  if(audioUnlocked){
    adhanAudio.currentTime = 0;
    adhanAudio.play().catch(e => console.log("Adhan play blocked:", e));
  } else {
    console.log("Adhan time but audio not unlocked yet. User must tap screen first.");
  }

  // Notification
  if("Notification" in window && Notification.permission === "granted"){
    new Notification("🕌 Prayer Time",{body:"It's time for "+prayer, icon:"logo.png"});
  } else if("Notification" in window && Notification.permission!== "denied"){
    Notification.requestPermission();
  }

  // Vibrate
  if(navigator.vibrate){
    navigator.vibrate([500,300,500]);
  }
}

// =====================
// LOAD PRAYER TIMES - FAST VERSION
// =====================
function loadPrayerTimes(lat, lon, isDefault = false){
  // 1. Try cache first for instant load
  const cached = loadFromCache();
  if (cached && isDefault) {
    displayPrayerTimes(cached);
    document.getElementById("location").innerHTML = "Kampala, Uganda";
  }

  // 2. Fetch fresh data anyway
  fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`)
   .then(res=>res.json())
   .then(data=>{
      displayPrayerTimes(data);
      saveToCache(data);
      if (!isDefault) {
        document.getElementById("location").innerHTML = "Your location detected";
      } else {
        document.getElementById("location").innerHTML = "Kampala, Uganda";
      }
    })
   .catch(()=>{
      if (!cached) {
        document.getElementById("prayerBox").innerHTML="Could not load prayer times.";
      }
    });
}

// =====================
// START EVERYTHING
// =====================
// 1. Load Kampala immediately so page is usable in <300ms
loadPrayerTimes(KAMPALA_LAT, KAMPALA_LON, true);

// 2. Try to get precise GPS in background. If it works, update times.
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(position=>{
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;
    // Only reload if user is >50km from Kampala
    const distance = Math.abs(lat - KAMPALA_LAT) + Math.abs(lon - KAMPALA_LON);
    if (distance > 0.5) {
      loadPrayerTimes(lat, lon, false);
    }
  },
  ()=>{}, // If GPS fails, we already have Kampala loaded
  {timeout: 5000});
}

// Request notification permission on load
if("Notification" in window && Notification.permission === "default"){
  Notification.requestPermission();
}
</script>

</body>
</html>
