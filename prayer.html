<script>
// =====================
// PRAYER VARIABLES
// =====================

let lastAdhanDate = ""; // e.g. "Thu Apr 23 2026"
let audioUnlocked = false;

// =====================
// UNLOCK AUDIO FOR AUTOPLAY
// =====================
function unlockAudio() {
  if (audioUnlocked) return;
  const adhanAudio = document.getElementById("adhanAudio");
  adhanAudio.play().then(() => {
    adhanAudio.pause();
    adhanAudio.currentTime = 0;
    audioUnlocked = true;
    document.getElementById("unlockMsg").style.display = "none";
    console.log("Adhan audio unlocked");
  }).catch(e => console.log("Unlock failed:", e));
}
// First tap anywhere unlocks audio
document.body.addEventListener("click", unlockAudio, { once: true });
document.body.addEventListener("touchstart", unlockAudio, { once: true });

// =====================
// GET NEXT PRAYER
// =====================
function getNextPrayer(timings){
  const prayers = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];
  const now = new Date();
  let next = null;

  for(let p of prayers){
    const time = timings[p].split(":");
    const prayerTime = new Date();
    prayerTime.setHours(time[0], time[1], 0, 0);
    if(prayerTime > now){
      next = p;
      break;
    }
  }
  if(!next) next = "Fajr"; // After Isha, next is tomorrow's Fajr
  return next;
}
