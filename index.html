<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chair Islamic TV Quran</title>
  <style>
    .ayah { margin-bottom: 15px; }
    .arabic { font-size: 22px; direction: rtl; text-align: right; }
    .translation { font-size: 16px; color: #333; }
    .ayah-number { font-weight: bold; color: #555; }
  </style>
</head>
<body>

  <h1>Chair Islamic TV Quran Reader</h1>

  <label for="surahSelect">Select Surah:</label>
  <select id="surahSelect">
    <option value="">--Select Surah--</option>
  </select>

  <label for="reciterSelect">Select Reciter:</label>
  <select id="reciterSelect">
    <option value="afasy">Afasy</option>
    <option value="baset">Baset</option>
    <option value="ghamdi">Ghamdi</option>
  </select>

  <div id="audioPlayer"></div>

  <div id="quranText"></div>

  <h2>Latest YouTube Video</h2>
  <div id="youtubeVideos"></div>

  <h2>Prayer Times</h2>
  <input type="text" id="cityInput" placeholder="Enter city">
  <button onclick="getPrayerTimes()">Get Prayer Times</button>
  <div id="prayerTimes"></div>

  <h2>Ask a Question</h2>
  <input type="text" id="userName" placeholder="Your Name"><br>
  <input type="email" id="userEmail" placeholder="Your Email"><br>
  <textarea id="userQuestion" placeholder="Your Question"></textarea><br>
  <button onclick="sendQuestion()">Send</button>
  <div id="questionStatus"></div>

  <script src="script.js"></script>
</body>
</html>
