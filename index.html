<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chair Islamic TV</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #1a1a1a;
            color: #d4af37;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        h1,h2,h3 { color: #ffd700; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        select, input, textarea, button { 
            padding: 10px; 
            margin: 5px 0; 
            width: 100%; 
            border-radius: 5px; 
            border: none; 
        }
        .ayah { margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #444; }
        .arabic { font-size: 22px; text-align: right; direction: rtl; margin-bottom: 5px; }
        .translation { font-size: 18px; }
        audio { width: 100%; margin-top: 10px; }
        iframe { width: 100%; height: 315px; border: none; margin-bottom: 20px; }
        .section { margin-bottom: 40px; }
        button { background-color: #d4af37; color: #1a1a1a; font-weight: bold; cursor: pointer; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">

        <!-- A. Info -->
        <div class="section" id="infoSection">
            <h1>Chair Islamic TV</h1>
            <p>Welcome to Chair Islamic TV. Listen to the Quran, watch latest Islamic videos, get prayer times and ask questions.</p>
        </div>

        <!-- B. Latest Info -->
        <div class="section" id="latestInfo">
            <h2>Latest YouTube Videos</h2>
            <div id="youtubeVideos">Loading...</div>
        </div>

        <!-- C. Ask a Question -->
        <div class="section" id="askQuestion">
            <h2>Ask a Question</h2>
            <input type="text" id="userName" placeholder="Your Name">
            <input type="email" id="userEmail" placeholder="Your Email">
            <textarea id="userQuestion" placeholder="Your Question"></textarea>
            <button onclick="sendQuestion()">Send Question</button>
            <p id="questionStatus"></p>
        </div>

        <!-- D. Prayer Time -->
        <div class="section" id="prayerTime">
            <h2>Prayer Times</h2>
            <input type="text" id="cityInput" placeholder="Enter City">
            <button onclick="getPrayerTimes()">Get Prayer Times</button>
            <div id="prayerTimes"></div>
        </div>

        <!-- Quran Reader -->
        <div class="section" id="quranSection">
            <h2>Quran Reader</h2>
            <select id="surahSelect">
                <option value="">Select Surah</option>
            </select>
            <select id="reciterSelect">
                <option value="afasy">Afasy</option>
                <option value="baset">Baset</option>
                <option value="ghamdi">Ghamdi</option>
            </select>
            <button onclick="loadSurah()">Load Surah</button>
            <div id="audioPlayer"></div>
            <div id="quranText"></div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
