<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chair Islamic TV</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4af37">

<style>

body{
background:#0f0f0f;
color:#d4af37;
font-family:Arial;
margin:0;
padding:20px;
}

h1,h2{
color:#ffd700;
}

.container{
max-width:900px;
margin:auto;
}

select,input,textarea,button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
}

button{
background:#d4af37;
color:black;
font-weight:bold;
}

.arabic{
font-size:24px;
direction:rtl;
text-align:right;
}

.translation{
font-size:18px;
color:#eee;
}

.ayah{
border-bottom:1px solid #333;
padding:10px 0;
}

iframe{
width:100%;
height:315px;
border:none;
margin-bottom:15px;
}

audio{
width:100%;
}

</style>

</head>

<body>

<div class="container">

<h1>Chair Islamic TV</h1>

<p>
Welcome to Chair Islamic TV.  
Read Quran, listen to recitation, watch Islamic videos and check prayer times.
</p>

<hr>

<h2>Latest Videos</h2>

<div id="youtubeVideos">
Loading videos...
</div>

<hr>

<h2>Ask a Question</h2>

<input id="userName" placeholder="Your Name">

<input id="userEmail" placeholder="Email">

<textarea id="userQuestion" placeholder="Your Question"></textarea>

<button onclick="sendQuestion()">Send Question</button>

<p id="questionStatus"></p>

<hr>

<h2>Prayer Times</h2>

<input id="cityInput" placeholder="Enter City (example Kampala)">

<button onclick="getPrayerTimes()">Get Prayer Times</button>

<div id="prayerTimes"></div>

<hr>

<h2>Quran Reader</h2>

<select id="surahSelect">
<option value="">Select Surah</option>
</select>

<select id="reciterSelect">

<option value="afasy">Mishary Alafasy</option>

<option value="baset">Abdul Baset</option>

<option value="ghamdi">Saad Al Ghamdi</option>

</select>

<button onclick="loadSurah()">Load Surah</button>

<div id="audioPlayer"></div>

<div id="quranText"></div>

</div>

<script src="script.js"></script>

</body>
</html>
