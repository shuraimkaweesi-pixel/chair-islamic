<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Hadith | Chair Islamic TV</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="apple-touch-icon" href="logo.png">

<link rel="stylesheet" href="styles.css">

<style>
/* Additional Hadith styles */
.arabic {
  font-size: 24px;
  text-align: right;
  direction: rtl;
  color: #fff;
  margin-bottom: 20px;
}

.translation {
  font-size: 18px;
  color: #ddd;
}

#hadithBox {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 8px;
  margin-top: 20px;
  line-height: 1.6;
}

/* Bottom Navigation */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #000;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  border-top: 1px solid #333;
}

.bottom-nav a {
  color: #FFD700;
  text-decoration: none;
  font-size: 14px;
  flex: 1;
  text-align: center;
}

.bottom-nav a:hover {
  color: white;
}
</style>
</head>

<body>

<div class="container">

<h1>Daily Hadith</h1>
<p>Authentic sayings of Prophet Muhammad ﷺ</p>

<div id="hadithBox">Loading Hadith...</div>

</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <a href="index.html">🏠 Home</a>
  <a href="quran.html">📖 Quran</a>
  <a href="hadith.html">📜 Hadith</a>
  <a href="prayer.html">🕌 Prayer</a>
  <a href="videos.html">🎥 Videos</a>
</div>

<script>
// =======================
// Load Random Hadith
// =======================
async function loadHadith() {
  try {
    // Load local JSON file (hadiths.json)
    const response = await fetch("hadiths.json");
    const data = await response.json();

    // Pick a random Hadith
    const random = data[Math.floor(Math.random() * data.length)];

    // Display
    document.getElementById("hadithBox").innerHTML = `
      <div class="arabic">${random.arab}</div>
      <hr>
      <div class="translation">${random.en}</div>
    `;
  } catch (error) {
    document.getElementById("hadithBox").innerHTML = "Could not load Hadith.";
    console.error("Hadith load error:", error);
  }
}

// Load Hadith on page load
loadHadith();
</script>

</body>
</html>
