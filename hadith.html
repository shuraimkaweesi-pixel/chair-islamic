<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Hadith | Chair Islamic TV</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">

<style>

body{
background:#0f0f0f;
color:#FFD700;
font-family:Arial, sans-serif;
margin:0;
padding:20px;
padding-bottom:90px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
}

h1{
color:#FFD700;
}

p{
color:#ddd;
}

.hadith-box{
background:#1a1a1a;
padding:20px;
border-radius:8px;
margin-top:20px;
line-height:1.6;
}

.arabic{
font-size:24px;
direction:rtl;
text-align:right;
color:white;
margin-bottom:20px;
}

.translation{
font-size:18px;
color:#ddd;
}

/* Bottom Navigation */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid #333;
}

.bottom-nav a{
color:#FFD700;
text-decoration:none;
font-size:14px;
flex:1;
text-align:center;
}

.bottom-nav a:hover{
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>Daily Hadith</h1>

<p>Authentic sayings of Prophet Muhammad ﷺ</p>

<div id="hadithBox" class="hadith-box">

Loading Hadith...

</div>

</div>

<!-- Bottom Navigation -->

<div class="bottom-nav">

<a href="index.html">🏠 Home</a>

<a href="quran.html">📖 Quran</a>

<a href="hadith.html">📜 Hadith</a>

<a href="prayer.html">🕌 Prayer</a>

<a href="videos.html">🎥 Videos</a>

</div>

<script>

async function loadHadith(){

try{

const response = await fetch("https://api.hadith.sutanlab.id/books/muslim?range=1-50");

const data = await response.json();

const hadithList = data.data.hadiths;

const random = hadithList[Math.floor(Math.random()*hadithList.length)];

document.getElementById("hadithBox").innerHTML = `

<div class="arabic">
${random.arab}
</div>

<hr>

<div class="translation">
${random.id}
</div>

`;

}catch(error){

document.getElementById("hadithBox").innerHTML="Could not load hadith.";

}

}

loadHadith();

</script>

</body>

</html>
