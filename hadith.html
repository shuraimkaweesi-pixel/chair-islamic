<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>40 Hadith Nawawi - Chair Islamic TV</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A0A0A">
<link rel="apple-touch-icon" href="logo.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>📜 40 Hadith Nawawi</h1>
  <p class="page-header">Authentic Collection - Verified</p>

  <div class="card">
    <!-- Added more intuitive placeholder -->
    <input type="text" id="hadithSearch" placeholder="Search by number, keyword, or Arabic..." onkeyup="searchHadith()">
  </div>

  <div id="hadithList">
    <div class="card"><p class="text-body">Loading hadiths...</p></div>
  </div>

  <div class="card">
    <div class="card-title">All 40 Hadith Complete</div>
    <p class="arabic" dir="rtl" style="font-size:24px; text-align:center;">تَمَّتِ الأَرْبَعُونَ النَّوَوِيَّةُ</p>
    <button class="btn-gold" onclick="location.href='index.html'">🏠 Back to Home</button>
  </div>

</div>

<div class="bottom-nav">
  <a href="index.html">🏠<br>Home</a>
  <a href="quran.html">📖<br>Qur'an</a>
  <a href="hadith.html" class="active">📜<br>Hadith</a>
  <a href="prayer.html">🕌<br>Prayer</a>
  <a href="videos.html">🎥<br>Videos</a>
</div>

<script>
// ===============================
// LOAD HADITH FROM JSON
// ===============================
let allHadiths = [];

async function loadHadiths() {
  try {
    // UPDATED: Now points to 'hadiths.json' as requested
    const response = await fetch('hadiths.json');
    if (!response.ok) throw new Error("File not found");
    
    allHadiths = await response.json();
    renderHadiths(allHadiths);
  } catch (err) {
    console.error(err);
    document.getElementById('hadithList').innerHTML = 
      `<div class="card"><p class="text-body" style="color: #ff6b6b;">Error: Could not find 'hadiths.json'. Please ensure the file is named correctly in your folder.</p></div>`;
  }
}

function renderHadiths(hadiths) {
  const container = document.getElementById('hadithList');
  
  // Handle empty search results
  if (hadiths.length === 0) {
    container.innerHTML = '<div class="card"><p class="text-body">No matching Hadiths found.</p></div>';
    return;
  }

  container.innerHTML = hadiths.map(h => `
    <div class="card hadith-item" id="hadith${h.id}">
      <div class="card-title">Hadith ${h.id} of 40 - ${h.title}</div>
      <!-- Added dir="rtl" for proper Arabic alignment -->
      <p class="arabic" dir="rtl">${h.arabic}</p>
      <div class="divider"></div>
      <p class="text-body">${h.english}</p>
      <div class="badge">${h.reference}</div>
      <div class="btn-group">
        <button class="btn-outline" onclick="shareHadith(${h.id})">📤 Share</button>
        <button class="btn-outline" onclick="saveHadith(${h.id})">🤍 Save</button>
      </div>
    </div>
  `).join('');
}

// ===============================
// SEARCH HADITH
// ===============================
function searchHadith() {
  const term = document.getElementById('hadithSearch').value.toLowerCase().trim();
  
  const filtered = allHadiths.filter(h => 
    h.title.toLowerCase().includes(term) || 
    h.arabic.includes(term) || 
    h.english.toLowerCase().includes(term) ||
    h.id.toString() === term
  );
  
  renderHadiths(filtered);
}

// ===============================
// SHARE HADITH
// ===============================
function shareHadith(id) {
  const h = allHadiths.find(x => x.id === id);
  if (!h) return;

  const text = `${h.arabic}\n\n${h.english}\n\nRef: ${h.reference}\n\nShared via Chair Islamic TV`;
  
  if (navigator.share) {
    navigator.share({ title: `Hadith ${id}: ${h.title}`, text: text });
  } else {
    navigator.clipboard.writeText(text);
    alert('Hadith copied to clipboard!');
  }
}

// ===============================
// SAVE HADITH
// ===============================
function saveHadith(id) {
  let saved = JSON.parse(localStorage.getItem('savedHadiths') || '[]');
  if (!saved.includes(id)) {
    saved.push(id);
    localStorage.setItem('savedHadiths', JSON.stringify(saved));
    alert(`🤍 Hadith ${id} saved to your favorites!`);
  } else {
    alert('This Hadith is already in your saved list.');
  }
}

// Initialize
loadHadiths();
</script>

</body>
</html>
